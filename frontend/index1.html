<!DOCTYPE html>
<html>
<head>
    <title>Kataza Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- YOUR CSS -->
    <link href="css/style.css" rel="stylesheet">
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <div class="logo mb-4">
                🦁 Kataza
            </div>
            <hr>
            <p>Dashboard</p>
        </div>

        <!-- MAIN CONTENT -->
        <div class="col-md-10 content">

            <div class="d-flex justify-content-between mb-3">
                <h4>Dashboard</h4>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#memberModal">
                    + Add Member
                </button>
            </div>

            <hr>

            <!-- CARDS -->
            <div class="row g-3 mb-4">

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>Expected (52 weeks)</h6>
                        <h5 id="expectedYear"></h5>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>Expected Current Week</h6>
                        <h5 id="expectedWeek"></h5>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>Amount in Account</h6>
                        <h5 id="bankTotal"></h5>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>Loans Amount</h6>
                        <h5 id="loanTotal">0</h5>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>Pending Last Week</h6>
                        <h5 id="pendingLastWeek"></h5>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>This Week Progress</h6>
                        <h5 id="weekProgress"></h5>
                    </div>
                </div>

                <div class="col-md-3">
                    <div class="card p-3 card-box">
                        <h6>Loan Requests</h6>
                        <h5 id="loanRequests">0</h5>
                    </div>
                </div>

            </div>

            <!-- MEMBERS TABLE -->
            <div class="card p-3">
                <h5>Members</h5>

                <table class="table table-bordered" id="membersTable">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal fade" id="memberModal">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5>Add Member</h5>
            </div>

            <div class="modal-body">
                <input id="name" class="form-control mb-2" placeholder="Name">
                <input id="phone" class="form-control" placeholder="Phone">
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="addMember()">Save</button>
            </div>

        </div>
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>

</body>
</html>
