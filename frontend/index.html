<!DOCTYPE html>
<html>
<head>
    <title>Kataza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

<div class="container">

    <h3>Kataza System</h3>

    <!-- MEMBER -->
    <div class="card p-3 mb-4">
        <h5>Add Member</h5>

        <input id="name" class="form-control mb-2" placeholder="Name">
        <input id="phone" class="form-control mb-2" placeholder="Phone">

        <button class="btn btn-primary" onclick="addMember()">Save</button>
    </div>

    <!-- CONTRIBUTIONS -->
    <div class="card p-3">
        <h5>Weekly Contributions</h5>

        <input id="week" type="number" class="form-control mb-2" placeholder="Week">
        <input id="year" type="number" class="form-control mb-2" value="2026">

        <table class="table" id="table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Paid</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <button class="btn btn-success" onclick="saveContributions()">Save All</button>
    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
